<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BSTM Network — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040d;color:#e0e0e0;font-family:'IBM Plex Mono',monospace;overflow:hidden;height:100vh;width:100vw}
#app{width:100vw;height:100vh;position:relative}

/* STATS BAR */
#statsbar{
  position:absolute;top:0;left:0;right:0;height:52px;z-index:200;
  background:linear-gradient(180deg,#04040d 0%,#04040dee 100%);
  border-bottom:1px solid #12122a;
  display:flex;align-items:center;padding:0 20px;gap:0;
  backdrop-filter:blur(12px);
}
.logo{font-size:14px;font-weight:900;color:#d4af37;letter-spacing:.14em;margin-right:22px;text-shadow:0 0 16px #d4af3755}
.logo span{color:#38bdf8}
.logo sub{font-size:8px;color:#333;font-weight:400;margin-left:6px}
.divider{width:1px;height:28px;background:#12122a;margin-right:20px}
.stat{margin-right:20px}
.stat-l{font-size:7px;color:#444;letter-spacing:.12em}
.stat-v{font-size:12px;font-weight:800}
.status-dot{width:6px;height:6px;border-radius:50%;margin-right:10px;display:inline-block}
.bar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.sync-txt{font-size:9px;color:#2a2a4a}
.btn-sm{background:#0a0f1a;border:1px solid #60a5fa33;border-radius:5px;color:#60a5fa;font-size:9px;padding:4px 10px;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em}
.btn-sm:hover{border-color:#60a5fa88;color:#93c5fd}

/* CANVAS AREA */
#canvas-wrap{position:absolute;inset:0;top:52px;overflow:hidden;cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
#canvas-wrap svg{width:100%;height:100%;display:block}

/* BURN WIDGET */
#burn{
  position:absolute;bottom:20px;left:20px;z-index:100;
  background:#0f0500;border:1.5px solid #fb923c77;
  box-shadow:0 0 24px #fb923c33;border-radius:10px;
  padding:12px 18px;min-width:140px;
}
#burn .bl{font-size:8px;color:#fb923c;letter-spacing:.18em;margin-bottom:4px}
#burn .bv{font-size:24px;font-weight:900;color:#fb923c}
#burn .bs{font-size:8px;color:#555;margin-top:3px}

/* VIEW PANEL */
#panel{
  position:absolute;top:62px;right:16px;z-index:300;
  background:#06060e;border:1.5px solid #38bdf8;
  box-shadow:0 0 28px #38bdf833;border-radius:12px;
  padding:18px;width:272px;
  display:none;animation:slideIn .18s ease;
}
#panel.visible{display:block}
.panel-type{font-size:8px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2px}
.panel-name{font-size:14px;font-weight:900;color:#f0f0f0;line-height:1.3;margin-bottom:14px}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.panel-cell{background:#0d0d1a;border-radius:6px;padding:7px 9px}
.panel-cell-l{font-size:7px;color:#444;letter-spacing:.1em}
.panel-cell-v{font-size:13px;font-weight:800;margin-top:2px}
.panel-parent{font-size:9px;color:#555;margin-bottom:6px}
.panel-url{font-size:9px;word-break:break-all;text-decoration:none;display:block;margin-bottom:8px}
.panel-notes{font-size:9px;color:#666;margin-bottom:8px;line-height:1.5}
.panel-open{
  display:block;text-align:center;background:#00101a;
  border:1px solid #38bdf8;border-radius:7px;color:#38bdf8;
  font-size:10px;padding:8px 0;text-decoration:none;font-weight:800;
  box-shadow:0 0 16px #38bdf833;margin-bottom:8px;letter-spacing:.08em;
}
.btn-edit{
  width:100%;background:#0a0f1a;border:1px solid #38bdf866;
  border-radius:7px;color:#38bdf8;padding:9px 0;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:800;letter-spacing:.1em;
  box-shadow:0 0 10px #38bdf822;
}
.btn-edit:hover{border-color:#38bdf8;box-shadow:0 0 16px #38bdf844}
#panel-close{background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:0;position:absolute;top:14px;right:14px}

/* EDIT MODAL */
#modal-backdrop{position:fixed;inset:0;background:#000c;z-index:800;display:none;backdrop-filter:blur(4px)}
#modal-backdrop.visible{display:block}
#modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:900;background:#06060f;border:1.5px solid #252540;
  box-shadow:0 0 80px #000;border-radius:14px;
  width:420px;max-height:88vh;overflow-y:auto;padding:24px;
  font-family:'IBM Plex Mono',monospace;
}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-tag{font-size:8px;color:#555;letter-spacing:.15em}
.modal-title{font-size:15px;font-weight:900;color:#e0e0e0;margin-top:3px}
#modal-close{background:none;border:1px solid #252540;border-radius:6px;color:#555;font-size:16px;cursor:pointer;padding:4px 10px}
.field{margin-bottom:12px}
.field label{font-size:9px;color:#555;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;display:block}
.field input,.field select,.field textarea{
  width:100%;background:#090912;border:1px solid #1e1e38;
  border-radius:6px;color:#e0e0e0;padding:8px 10px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#38bdf855}
.field textarea{height:64px;resize:vertical}
.field-row{display:grid;gap:10px;margin-bottom:12px}
.field-row.two{grid-template-columns:1fr 1fr}
.field-row.three{grid-template-columns:1fr 1fr 1fr}
.msg{border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:11px;display:none}
.msg.ok{background:#0a1a0a;border:1px solid #22c55e44;color:#22c55e;display:block}
.msg.err{background:#1a0a0a;border:1px solid #ef444444;color:#ef4444;display:block}
.modal-btns{display:flex;gap:10px}
.btn-cancel{flex:1;background:none;border:1px solid #252540;border-radius:7px;color:#666;padding:10px 0;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px}
.btn-save{flex:2;background:#14532d;border:2px solid #22c55e;border-radius:7px;color:#22c55e;padding:10px 0;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:900;letter-spacing:.1em;box-shadow:0 0 18px #22c55e44;transition:all .15s}
.btn-save:hover{background:#166534;box-shadow:0 0 28px #22c55e77;color:#fff}
.btn-save:active{transform:scale(.97)}
.modal-id{margin-top:10px;font-size:8px;color:#2a2a3a;text-align:center}

/* NODE SVG STYLES */
.node-card{cursor:pointer;transition:filter .2s}
.node-card:hover .node-bg{filter:brightness(1.3)}
.node-card:hover .node-label{fill:#fff}
.node-pulse{animation:pulse-node 2.4s ease-in-out infinite}
.node-dot-pulse{animation:pulse-dot 2s ease-in-out infinite}

/* LOADING */
#loading{
  position:absolute;inset:0;background:#04040d;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  z-index:500;
}
#loading-title{font-size:11px;color:#d4af37;letter-spacing:.4em}
#loading-bar-wrap{width:180px;height:2px;background:#0d0d1a;border-radius:2px;overflow:hidden}
#loading-bar{height:100%;background:linear-gradient(90deg,#d4af37,#38bdf8);animation:loadBar 1.5s ease-in-out infinite}
#loading-sub{font-size:9px;color:#333;letter-spacing:.15em}

@keyframes pulse-node{0%,100%{filter:drop-shadow(0 0 4px #d4af3744)}50%{filter:drop-shadow(0 0 16px #d4af3799) drop-shadow(0 0 32px #d4af3744)}}
@keyframes pulse-dot{0%,100%{opacity:.8}50%{opacity:1;filter:blur(0)}}
@keyframes loadBar{0%{width:0%;margin-left:0}50%{width:65%;margin-left:17%}100%{width:0%;margin-left:100%}}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="app">

  <!-- Loading screen -->
  <div id="loading">
    <div id="loading-title">BSTM NETWORK</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-sub">CONNECTING TO SUPABASE...</div>
  </div>

  <!-- Stats bar -->
  <div id="statsbar">
    <div class="logo">BSTM<span>NET</span><sub>v3·LIVE</sub></div>
    <div class="divider"></div>
    <div class="stat"><div class="stat-l">NODES</div><div class="stat-v" id="s-nodes" style="color:#60a5fa">—</div></div>
    <div class="stat"><div class="stat-l">CITIZENS</div><div class="stat-v" id="s-users" style="color:#a78bfa">—</div></div>
    <div class="stat"><div class="stat-l">REVENUE</div><div class="stat-v" id="s-rev" style="color:#22c55e">—</div></div>
    <div class="stat"><div class="stat-l">THB BURN</div><div class="stat-v" id="s-burn" style="color:#fb923c">—</div></div>
    <div class="divider"></div>
    <span class="status-dot" id="dot-g" style="background:#22c55e;box-shadow:0 0 5px #22c55e"></span><span id="cnt-g" style="font-size:10px;color:#555;margin-right:10px">—</span>
    <span class="status-dot" id="dot-y" style="background:#eab308;box-shadow:0 0 5px #eab308"></span><span id="cnt-y" style="font-size:10px;color:#555;margin-right:10px">—</span>
    <span class="status-dot" id="dot-r" style="background:#ef4444;box-shadow:0 0 5px #ef4444"></span><span id="cnt-r" style="font-size:10px;color:#555;margin-right:10px">—</span>
    <div class="bar-right">
      <span class="sync-txt" id="sync-txt">SYNC 60s</span>
      <button class="btn-sm" onclick="loadData()">↺ REFRESH</button>
    </div>
  </div>

  <!-- Graph canvas -->
  <div id="canvas-wrap">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#38bdf855"/>
        </marker>
        <marker id="arr-thb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#fb923c88"/>
        </marker>
        <marker id="arr-hld" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa55"/>
        </marker>
        <filter id="glow-gold"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-blue"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g id="graph-root"></g>
    </svg>
  </div>

  <!-- Burn widget -->
  <div id="burn">
    <div class="bl">🔥 THB BURNED</div>
    <div class="bv" id="burn-val">0</div>
    <div class="bs">2% trade · 5% unstake</div>
  </div>

  <!-- View panel -->
  <div id="panel">
    <button id="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-type" id="p-type"></div>
    <div class="panel-name" id="p-name"></div>
    <div class="panel-grid">
      <div class="panel-cell"><div class="panel-cell-l">STATUS</div><div class="panel-cell-v" id="p-status"></div></div>
      <div class="panel-cell"><div class="panel-cell-l">USERS</div><div class="panel-cell-v" style="color:#a78bfa" id="p-users"></div></div>
      <div class="panel-cell"><div class="panel-cell-l">REVENUE</div><div class="panel-cell-v" style="color:#22c55e" id="p-rev"></div></div>
      <div class="panel-cell"><div class="panel-cell-l">THB BURN</div><div class="panel-cell-v" style="color:#fb923c" id="p-thb"></div></div>
    </div>
    <div class="panel-parent" id="p-parent"></div>
    <a class="panel-url" id="p-url" target="_blank" rel="noopener noreferrer" style="display:none"></a>
    <div class="panel-notes" id="p-notes" style="display:none"></div>
    <a class="panel-open" id="p-open" target="_blank" rel="noopener noreferrer" style="display:none">↗ OPEN APP</a>
    <button class="btn-edit" onclick="openEdit()">✎ EDIT NODE</button>
  </div>

  <!-- Edit modal -->
  <div id="modal-backdrop" onclick="closeModal()"></div>
  <div id="modal">
    <div class="modal-hdr">
      <div><div class="modal-tag">EDIT NODE · SUPABASE LIVE</div><div class="modal-title" id="m-title"></div></div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field"><label>Name</label><input id="m-name" type="text"/></div>
    <div class="field-row two">
      <div class="field"><label>Type</label>
        <select id="m-type">
          <option>sovereign</option><option>trust</option><option>foundation</option>
          <option>org</option><option>company</option><option>dept</option><option>room</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="m-status">
          <option value="green">🟢 green</option>
          <option value="yellow">🟡 yellow</option>
          <option value="red">🔴 red</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Parent Node</label><input id="m-parent" type="text" placeholder="e.g. BSTM Holdings"/></div>
    <div class="field-row three">
      <div class="field"><label>Users</label><input id="m-users" type="number" min="0"/></div>
      <div class="field"><label>Revenue (P)</label><input id="m-revenue" type="number" min="0"/></div>
      <div class="field"><label>THB Burn</label><input id="m-thb" type="number" min="0"/></div>
    </div>
    <div class="field"><label>URL</label><input id="m-url" type="text" placeholder="https://..."/></div>
    <div class="field"><label>Notes</label><textarea id="m-notes"></textarea></div>
    <div id="m-msg" class="msg"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" id="m-save-btn" onclick="saveNode()">✓ SAVE TO SUPABASE</button>
    </div>
    <div class="modal-id" id="m-id"></div>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPA_URL  = 'https://jeyneeetujvudwyovdzd.supabase.co'
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpleW5lZWV0dWp2dWR3eW92ZHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjc4OTQsImV4cCI6MjA4ODg0Mzg5NH0.THSZCPRmx-4TVDAyuqerWWNwtk7mniKuv9dQtpkFoM8'
const sb = supabase.createClient(SUPA_URL, SUPA_ANON)

// ── THEME ─────────────────────────────────────────────────────────────────────
const TH = {
  sovereign: {b:'#d4af37',bg:'#0f0900',text:'#d4af37'},
  trust:     {b:'#60a5fa',bg:'#000b1a',text:'#60a5fa'},
  foundation:{b:'#34d399',bg:'#001610',text:'#34d399'},
  org:       {b:'#a78bfa',bg:'#0c0018',text:'#a78bfa'},
  company:   {b:'#fb923c',bg:'#150800',text:'#fb923c'},
  dept:      {b:'#38bdf8',bg:'#000f18',text:'#38bdf8'},
  room:      {b:'#4b5563',bg:'#0c0c0c',text:'#9ca3af'},
}
const SC = {green:'#22c55e',yellow:'#eab308',red:'#ef4444'}
const LAYERS = ['sovereign','trust','foundation','org','company','dept','room']
const YY = [0,220,420,620,820,1040,1260]
const GG = [0,320,290,250,215,190,125]
const NW = {sovereign:200,trust:180,foundation:190,org:160,company:155,dept:150,room:108}
const NH = {sovereign:52,trust:44,foundation:44,org:40,company:38,dept:36,room:32}

// ── STATE ─────────────────────────────────────────────────────────────────────
let allNodes = []
let selectedNode = null
let editingNode = null
let countdown = 60
let countTimer = null

// ── PAN/ZOOM ──────────────────────────────────────────────────────────────────
let vx=0,vy=0,vz=1
let dragging=false,lastX=0,lastY=0
const wrap = document.getElementById('canvas-wrap')
const root = document.getElementById('graph-root')

function setTransform(){root.setAttribute('transform',`translate(${vx},${vy}) scale(${vz})`)}

wrap.addEventListener('mousedown',e=>{if(e.target===wrap||e.target.closest('#svg')&&!e.target.closest('.node-card')){dragging=true;lastX=e.clientX;lastY=e.clientY;wrap.classList.add('dragging')}})
window.addEventListener('mousemove',e=>{if(!dragging)return;vx+=e.clientX-lastX;vy+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;setTransform()})
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('dragging')})
wrap.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:.91;const rect=wrap.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;vx=mx-(mx-vx)*f;vy=my-(my-vy)*f;vz*=f;vz=Math.max(.03,Math.min(3,vz));setTransform()},{passive:false})

// Touch support
let touches=[]
wrap.addEventListener('touchstart',e=>{touches=[...e.touches];if(touches.length===1){dragging=true;lastX=touches[0].clientX;lastY=touches[0].clientY}})
wrap.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&dragging){vx+=e.touches[0].clientX-lastX;vy+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;setTransform()}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.hypot(dx,dy);if(touches.length===2){const pd=Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY);vz*=d/pd;vz=Math.max(.03,Math.min(3,vz));setTransform()}touches=[...e.touches]}},{passive:false})
wrap.addEventListener('touchend',()=>{dragging=false;touches=[]})

// ── GRAPH RENDER ──────────────────────────────────────────────────────────────
function buildGraph(data){
  const g = document.getElementById('graph-root')
  g.innerHTML=''

  const nameToPos={}
  const byType={}
  LAYERS.forEach(t=>{byType[t]=[]})
  data.forEach(n=>{if(byType[n.type])byType[n.type].push(n)})

  // First pass: calc positions
  LAYERS.forEach((type,li)=>{
    const items=byType[type]
    const gap=GG[li]
    const totalW=(items.length-1)*gap
    const w=NW[type],h=NH[type]
    items.forEach((n,i)=>{
      const x=i*gap-totalW/2-w/2
      const y=YY[li]-h/2
      nameToPos[n.id]={x:x+w/2,y:y+h/2,w,h}
    })
  })

  // Edges layer
  const edgeG=document.createElementNS('http://www.w3.org/2000/svg','g')
  edgeG.setAttribute('id','edges')
  g.appendChild(edgeG)

  // Node layer
  const nodeG=document.createElementNS('http://www.w3.org/2000/svg','g')
  nodeG.setAttribute('id','nodes')
  g.appendChild(nodeG)

  // Build nameToId map
  const nameToId={}
  data.forEach(n=>{nameToId[n.name]=n.id})

  // Draw edges
  data.forEach(n=>{
    if(n.parent_name&&nameToId[n.parent_name]){
      const from=nameToPos[nameToId[n.parent_name]]
      const to=nameToPos[n.id]
      if(from&&to) drawEdge(edgeG,from,to,TH[n.type]?.b||'#38bdf8',n.type==='company'||n.type==='dept')
    }
    // CabLink cross-edges
    if(n.name==='CabLink PWA'){
      if(nameToId['THoBoCoin Ltd']){
        const from=nameToPos[nameToId['THoBoCoin Ltd']]
        const to=nameToPos[n.id]
        if(from&&to) drawEdge(edgeG,from,to,'#fb923c',true,'arr-thb','5,3','THB')
      }
      if(nameToId['BSTM Holdings']){
        const from=nameToPos[nameToId['BSTM Holdings']]
        const to=nameToPos[n.id]
        if(from&&to) drawEdge(edgeG,from,to,'#a78bfa44',false,'arr-hld','4,4')
      }
    }
  })

  // Draw nodes
  LAYERS.forEach((type,li)=>{
    const items=byType[type]
    const gap=GG[li]
    const totalW=(items.length-1)*gap
    const w=NW[type],h=NH[type]
    items.forEach((n,i)=>{
      const cx=i*gap-totalW/2
      const cy=YY[li]
      drawNode(nodeG,n,cx-w/2,cy-h/2,w,h)
    })
  })

  // Fit view on first load
  fitView()
}

function drawEdge(parent,from,to,color,animated,marker='arr',dash='',label=''){
  const mx=(from.x+to.x)/2
  const path=document.createElementNS('http://www.w3.org/2000/svg','path')
  const d=`M${from.x},${from.y} C${from.x},${(from.y+to.y)/2} ${to.x},${(from.y+to.y)/2} ${to.x},${to.y}`
  path.setAttribute('d',d)
  path.setAttribute('fill','none')
  path.setAttribute('stroke',color)
  path.setAttribute('stroke-width','1')
  path.setAttribute('marker-end',`url(#${marker})`)
  if(dash) path.setAttribute('stroke-dasharray',dash)
  if(animated){
    path.setAttribute('stroke-dasharray','8 4')
    path.innerHTML=`<animate attributeName="stroke-dashoffset" values="24;0" dur="1.2s" repeatCount="indefinite"/>`
  }
  parent.appendChild(path)
  if(label){
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text')
    tx.setAttribute('x',mx)
    tx.setAttribute('y',(from.y+to.y)/2)
    tx.setAttribute('fill',color)
    tx.setAttribute('font-size','9')
    tx.setAttribute('font-family','IBM Plex Mono,monospace')
    tx.setAttribute('text-anchor','middle')
    tx.textContent=label
    parent.appendChild(tx)
  }
}

function drawNode(parent,n,x,y,w,h){
  const th=TH[n.type]||TH.room
  const isSov=n.type==='sovereign'
  const isCab=n.name==='CabLink PWA'
  const isTHB=n.name==='THoBoCoin Ltd'

  const g=document.createElementNS('http://www.w3.org/2000/svg','g')
  g.setAttribute('class','node-card'+(isSov?' node-pulse':''))
  g.setAttribute('transform',`translate(${x},${y})`)
  g.style.cursor='pointer'
  g.addEventListener('click',()=>showPanel(n))

  // Background rect
  const rx=document.createElementNS('http://www.w3.org/2000/svg','rect')
  rx.setAttribute('width',w)
  rx.setAttribute('height',h)
  rx.setAttribute('rx','7')
  rx.setAttribute('fill',th.bg)
  rx.setAttribute('stroke',th.b)
  rx.setAttribute('stroke-width','1.5')
  rx.setAttribute('class','node-bg')
  g.appendChild(rx)

  // Scanline texture
  const lines=document.createElementNS('http://www.w3.org/2000/svg','rect')
  lines.setAttribute('width',w)
  lines.setAttribute('height',h)
  lines.setAttribute('rx','7')
  lines.setAttribute('fill','url(#scan)')
  lines.setAttribute('opacity','0.03')
  g.appendChild(lines)

  // Status dot
  const dotR=n.type==='room'?3:3.5
  const dot=document.createElementNS('http://www.w3.org/2000/svg','circle')
  dot.setAttribute('cx',10)
  dot.setAttribute('cy',h/2)
  dot.setAttribute('r',dotR)
  dot.setAttribute('fill',SC[n.status]||SC.green)
  if(isCab||isTHB) dot.setAttribute('class','node-dot-pulse')
  g.appendChild(dot)

  // Type label
  const typeLabel=isCab?'LIVE PWA':isTHB?'🔥 THB':n.type
  const tl=document.createElementNS('http://www.w3.org/2000/svg','text')
  tl.setAttribute('x',20)
  tl.setAttribute('y',n.type==='room'?h/2-5:h/2-8)
  tl.setAttribute('fill',th.b)
  tl.setAttribute('font-size','7')
  tl.setAttribute('font-family','IBM Plex Mono,monospace')
  tl.setAttribute('font-weight','700')
  tl.setAttribute('letter-spacing','1')
  tl.textContent=typeLabel.toUpperCase()
  g.appendChild(tl)

  // Node name
  const maxW=w-28
  const nl=document.createElementNS('http://www.w3.org/2000/svg','text')
  nl.setAttribute('x',20)
  nl.setAttribute('y',n.type==='room'?h/2+7:h/2+6)
  nl.setAttribute('fill','#e8e8e8')
  nl.setAttribute('font-size',n.type==='room'?'9.5':'11')
  nl.setAttribute('font-family','IBM Plex Mono,monospace')
  nl.setAttribute('font-weight','700')
  // Truncate if needed
  let name=n.name
  if(name.length>22&&n.type!=='sovereign') name=name.slice(0,20)+'…'
  nl.textContent=name
  g.appendChild(nl)

  // User count badge
  if(n.users>0){
    const ub=document.createElementNS('http://www.w3.org/2000/svg','text')
    ub.setAttribute('x',w-6)
    ub.setAttribute('y',h/2+6)
    ub.setAttribute('fill','#a78bfa')
    ub.setAttribute('font-size','8')
    ub.setAttribute('font-family','IBM Plex Mono,monospace')
    ub.setAttribute('text-anchor','end')
    ub.textContent=`👥${n.users}`
    g.appendChild(ub)
  }

  parent.appendChild(g)
}

function fitView(){
  const rect=wrap.getBoundingClientRect()
  const W=rect.width,H=rect.height-52
  // Graph spans roughly from -5000 to 5000 in X, 0 to 1300 in Y
  const gw=10000,gh=1500
  const scaleX=W/gw,scaleY=H/gh
  vz=Math.min(scaleX,scaleY)*0.85
  vx=W/2
  vy=60*vz
  setTransform()
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function showPanel(n){
  selectedNode=n
  const th=TH[n.type]||TH.room
  const panel=document.getElementById('panel')
  panel.style.borderColor=th.b
  panel.style.boxShadow=`0 0 28px ${th.b}33`
  document.getElementById('p-type').style.color=th.b
  document.getElementById('p-type').textContent=n.name==='CabLink PWA'?'🚕 LIVE PWA':n.type
  document.getElementById('p-name').textContent=n.name
  document.getElementById('p-status').textContent=n.status.toUpperCase()
  document.getElementById('p-status').style.color=SC[n.status]
  document.getElementById('p-users').textContent=(n.users||0).toLocaleString()
  document.getElementById('p-rev').textContent=`P${Number(n.revenue||0).toLocaleString()}`
  document.getElementById('p-thb').textContent=(n.thb_burn||0).toLocaleString()
  const pp=document.getElementById('p-parent')
  pp.textContent=n.parent_name?`↑ ${n.parent_name}`:''
  const pu=document.getElementById('p-url')
  if(n.url){pu.href=n.url;pu.textContent=`🔗 ${n.url}`;pu.style.color=th.b;pu.style.display='block'}else pu.style.display='none'
  const pn=document.getElementById('p-notes')
  if(n.notes){pn.textContent=`📝 ${n.notes}`;pn.style.display='block'}else pn.style.display='none'
  const po=document.getElementById('p-open')
  if(n.url){po.href=n.url;po.textContent=`↗ OPEN ${n.name==='CabLink PWA'?'CABLINK PWA':'APP'}`;po.style.display='block'}else po.style.display='none'
  document.getElementById('p-type').closest('#panel').querySelector('.btn-edit').style.borderColor=th.b+'66'
  document.getElementById('p-type').closest('#panel').querySelector('.btn-edit').style.color=th.b
  panel.classList.add('visible')
}

function closePanel(){
  document.getElementById('panel').classList.remove('visible')
  selectedNode=null
}

// ── EDIT MODAL ────────────────────────────────────────────────────────────────
function openEdit(){
  if(!selectedNode) return
  editingNode=selectedNode
  document.getElementById('m-title').textContent=editingNode.name
  document.getElementById('m-name').value=editingNode.name
  document.getElementById('m-type').value=editingNode.type
  document.getElementById('m-status').value=editingNode.status
  document.getElementById('m-parent').value=editingNode.parent_name||''
  document.getElementById('m-users').value=editingNode.users||0
  document.getElementById('m-revenue').value=editingNode.revenue||0
  document.getElementById('m-thb').value=editingNode.thb_burn||0
  document.getElementById('m-url').value=editingNode.url||''
  document.getElementById('m-notes').value=editingNode.notes||''
  document.getElementById('m-id').textContent=`ID: ${editingNode.id}`
  document.getElementById('m-msg').className='msg'
  document.getElementById('m-msg').textContent=''
  document.getElementById('m-save-btn').textContent='✓ SAVE TO SUPABASE'
  document.getElementById('modal-backdrop').classList.add('visible')
}

function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('visible')
  editingNode=null
}

async function saveNode(){
  if(!editingNode) return
  const btn=document.getElementById('m-save-btn')
  const msg=document.getElementById('m-msg')
  btn.textContent='SAVING...'
  btn.style.opacity='.7'
  msg.className='msg'

  const payload={
    name:document.getElementById('m-name').value,
    type:document.getElementById('m-type').value,
    parent_name:document.getElementById('m-parent').value||null,
    status:document.getElementById('m-status').value,
    users:parseInt(document.getElementById('m-users').value)||0,
    revenue:parseFloat(document.getElementById('m-revenue').value)||0,
    thb_burn:parseFloat(document.getElementById('m-thb').value)||0,
    url:document.getElementById('m-url').value||null,
    notes:document.getElementById('m-notes').value||null,
    last_update:new Date().toISOString(),
  }

  const {data,error}=await sb.from('ecosystem_map').update(payload).eq('id',editingNode.id).select().single()
  btn.style.opacity='1'
  if(error){
    msg.className='msg err'
    msg.textContent='❌ '+error.message
    btn.textContent='✓ SAVE TO SUPABASE'
    return
  }
  msg.className='msg ok'
  msg.textContent='✅ Saved!'
  allNodes=allNodes.map(n=>n.id===editingNode.id?{...n,...payload}:n)
  updateStats(allNodes)
  buildGraph(allNodes)
  if(selectedNode?.id===editingNode.id) showPanel({...editingNode,...payload})
  btn.textContent='✓ SAVE TO SUPABASE'
  setTimeout(closeModal,800)
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats(data){
  const users=data.reduce((s,n)=>s+(n.users||0),0)
  const rev=data.reduce((s,n)=>s+Number(n.revenue||0),0)
  const burn=data.reduce((s,n)=>s+Number(n.thb_burn||0),0)
  document.getElementById('s-nodes').textContent=data.length
  document.getElementById('s-users').textContent=users.toLocaleString()
  document.getElementById('s-rev').textContent=`P${rev.toLocaleString()}`
  document.getElementById('s-burn').textContent=burn.toLocaleString()
  document.getElementById('burn-val').textContent=burn.toLocaleString()
  document.getElementById('cnt-g').textContent=data.filter(n=>n.status==='green').length
  document.getElementById('cnt-y').textContent=data.filter(n=>n.status==='yellow').length
  document.getElementById('cnt-r').textContent=data.filter(n=>n.status==='red').length
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData(){
  const {data,error}=await sb.from('ecosystem_map').select('*').order('type')
  if(!error&&data&&data.length>0){
    allNodes=data
    updateStats(data)
    buildGraph(data)
  }
  document.getElementById('loading').style.display='none'
  countdown=60
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function startCountdown(){
  if(countTimer) clearInterval(countTimer)
  countTimer=setInterval(()=>{
    countdown--
    document.getElementById('sync-txt').textContent=`SYNC ${countdown}s`
    if(countdown<=0){countdown=60;loadData()}
  },1000)
}

// ── REALTIME ──────────────────────────────────────────────────────────────────
function startRealtime(){
  sb.channel('eco-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'ecosystem_map'},()=>{loadData()})
    .subscribe()
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',async()=>{
  await loadData()
  startCountdown()
  startRealtime()
})
</script>
